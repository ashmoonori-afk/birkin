name: "🧩 Skill Submission"
description: Submit a new skill for review — bundled, optional, or community hub.
title: "[Skill]: "
labels: ["skill-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing a skill! Please read the [skill guidelines](https://github.com/MoonGwanghoon/birkin/blob/main/CONTRIBUTING.md#adding-a-skill) before submitting.

        **Quick decision tree:**
        - **Broadly useful to most users?** → Bundled skill (`skills/`)
        - **Official but niche or has heavy dependencies?** → Optional skill (`optional-skills/`)
        - **Specialized or community-contributed?** → Skills Hub (share via registry)

  - type: input
    id: skill-name
    attributes:
      label: Skill Name
      description: The name as it appears in SKILL.md frontmatter.
      placeholder: "my-skill-name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What does this skill do?
      description: A clear description of the skill's purpose and when the agent should use it.
      placeholder: |
        This skill allows the agent to search and summarize academic papers
        from arXiv using their public API...
    validations:
      required: true

  - type: dropdown
    id: placement
    attributes:
      label: Proposed Placement
      description: Where should this skill live?
      options:
        - "Bundled (skills/) — broadly useful to most users"
        - "Optional (optional-skills/) — official but niche"
        - "Skills Hub — community registry"
    validations:
      required: true

  - type: textarea
    id: trigger-conditions
    attributes:
      label: Trigger Conditions
      description: When should the agent load this skill? What user messages or contexts should activate it?
      placeholder: |
        - User asks to search for academic papers
        - User mentions arXiv, research papers, or scientific literature
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: External Dependencies
      description: List any CLI tools, APIs, or packages this skill requires beyond stdlib Python, curl, and existing Birkin tools.
      placeholder: |
        - None (uses curl + web_extract only)
        - OR: Requires `jq` for JSON parsing
        - OR: Requires TENOR_API_KEY environment variable

  - type: dropdown
    id: platforms
    attributes:
      label: Platform Compatibility
      description: Which platforms does this skill support?
      options:
        - All platforms (macOS, Linux, Windows)
        - macOS only
        - macOS and Linux
        - Linux only
        - Windows only
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: How did you test this?
      description: Describe how you verified the skill works correctly.
      placeholder: |
        Ran `birkin --toolsets skills -q "Use the X skill to search for Y"`
        and verified the agent followed instructions correctly.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Skill Checklist
      description: Confirm your skill meets these requirements.
      options:
        - label: "SKILL.md follows the [standard format](https://github.com/MoonGwanghoon/birkin/blob/main/CONTRIBUTING.md#skillmd-format) (frontmatter, trigger conditions, steps, pitfalls)"
          required: true
        - label: "No external dependencies unless absolutely necessary"
          required: true
        - label: "I've tested the skill end-to-end with a real agent conversation"
          required: true
        - label: "Helper scripts (if any) use stdlib Python, curl, or existing Birkin tools"

  - type: textarea
    id: skill-md-preview
    attributes:
      label: SKILL.md Preview
      description: Paste the full SKILL.md content so reviewers can evaluate without cloning.
      render: markdown
